name: Node.js Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Build / Syntax Check
      run: node --check src/server.js
      
    # Note: To run automated API tests in CI:
    # 1. Setup GitHub Secrets for MONGODB_URI and other .env variables.
    # 2. Start server in background: npm start &
    # 3. Run httpyac tests: npm test
